name: Release

# Build installable desktop artifacts and attach them to a GitHub Release.
# Trigger by pushing a version tag, e.g.:  git tag v2.0.0 && git push origin v2.0.0
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest    # → .dmg (arm64 + x64)
          - os: windows-latest  # → NSIS installer .exe
          - os: ubuntu-latest   # → .AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build installers
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned builds: skip macOS notarization/signing.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Upload artifacts to the release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
      - name: Upload as workflow artifacts (for manual runs)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: pitwall-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
