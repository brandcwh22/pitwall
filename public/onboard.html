<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pit Wall — Get started</title>
    <link rel="icon" type="image/svg+xml" href="logos/pitwall-icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=Saira:wght@400;500;600&family=Spline+Sans+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/app.css" />
    <link rel="stylesheet" href="assets/settings.css" />
    <link rel="stylesheet" href="assets/onboard.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="logos/pitwall-icon.svg" alt="" aria-hidden="true" />
        <span class="brand-name">Pit Wall</span>
        <span class="brand-sub">Get started</span>
      </div>
      <div class="controls">
        <a class="sync" href="index.html" id="skipLink">Skip · view sample →</a>
      </div>
    </header>

    <div class="banner" id="banner" hidden></div>

    <main class="onboard">
      <ol class="steps" id="steps">
        <li class="active" data-step="1"><span>1</span> Choose platform</li>
        <li data-step="2"><span>2</span> Connect</li>
        <li data-step="3"><span>3</span> Pick your tiles</li>
      </ol>

      <!-- Step 1 -->
      <section id="stepProvider" class="step">
        <h1>Connect your ticketing platform</h1>
        <p class="muted">Pit Wall reads your QA metrics straight from your tracker. Pick where your work lives — your token stays on this machine.</p>
        <div class="provider-grid" id="providerGrid"></div>
      </section>

      <!-- Step 2 -->
      <section id="stepConnect" class="step" hidden>
        <button class="linklike" id="backBtn">← choose a different platform</button>
        <h1 id="connectTitle">Connect</h1>
        <p class="muted" id="connectHelp"></p>

        <form id="credForm" class="cred-form" autocomplete="off"></form>

        <div class="cred-actions">
          <button class="sync" id="testBtn" type="button">Test connection</button>
          <button class="sync primary" id="connectBtn" type="button" disabled>Connect &amp; continue →</button>
        </div>
        <div id="testResult" class="test-result"></div>
      </section>
    </main>

    <script src="assets/onboard.js"></script>
    <script src="assets/prefs-apply.js"></script>
  </body>
</html>
